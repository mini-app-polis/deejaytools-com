# deejaytools-com-app / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002
# Note: this repo lives at apps/app inside the deejaytools-com monorepo.

type: react-app

exemptions:
  - rule: TEST-013
    reason: >-
      Evaluator false positive — the check flags any setTimeout call with a hardcoded number as a production timeout that should be sourced from env. In a React app, setTimeout is used extensively for UI timing (toast fades, animation transitions, progress-bar finish-before-hide effects) where the value is a visual design choice, not a production-critical timeout. Specific hit: src/pages/SongsPage.tsx:219 is a 400ms delay between upload-progress-100% and the success toast, giving the progress bar time to visually complete. To remove this exemption, update check_hardcoded_timeouts in evaluator-cog to skip setTimeout calls in React/Astro source files, or scope the check to retry/HTTP/Prefect-task contexts only.

deferrals:
  - rule: CD-002
    reason: >-
      Browser-side Sentry not yet wired. The previous exemption claimed @sentry/react was installed and initialised; it isn't. Backlogged behind a deliberate decision on browser observability scope (free-tier @sentry/react vs. lightweight error reporter). When implemented, init in apps/app/src/main.tsx, add VITE_SENTRY_DSN to .env.example, and remove this deferral.
    until: null

# TEST-001/002/003/004 covered by react-app type scoping.
# XSTACK-001 covered by react-app type scoping (shared library required).
